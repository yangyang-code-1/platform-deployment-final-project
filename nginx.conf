server {
    listen 0.0.0.0:80 default_server;
    root /app/public;
    index index.php;

    # nag-log
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # nag-security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # nag-serve static files directly
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # nag-handle well-known requests, such as Let's Encrypt
    location ~ /\.well-known {
        allow all;
    }

    # nag-deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # nag-symfony front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # nag-handle php-fpm
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        internal;
    }

    # nag-deny ug direct access to other PHP files
    location ~ \.php$ {
        return 404;
    }
}